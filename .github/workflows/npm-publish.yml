name: Publish to npm

# Publishes @xenition/sdk to npm whenever package.json's version changes on main.
# main carries the PRODUCTION API URL (patched by the private repo's sync), so this always
# ships the prod-pointing build. The version-diff guard makes it idempotent: re-runs and
# non-version pushes (URL patches, doc edits) are no-ops, so only a real version bump publishes.
on:
  push:
    branches: [main]
    paths:
      - 'package.json'       # only react when the manifest (where version lives) changes
  workflow_dispatch: {}       # allow a manual publish from the Actions tab

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Read published version
        id: published
        run: |
          # `npm view` exits non-zero if the package/version was never published — treat as "none".
          PUB=$(npm view "@xenition/sdk@${{ steps.local.outputs.version }}" version 2>/dev/null || true)
          echo "version=$PUB" >> "$GITHUB_OUTPUT"

      - name: Decide
        id: decide
        run: |
          if [ -n "${{ steps.published.outputs.version }}" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "@xenition/sdk@${{ steps.local.outputs.version }} is already on npm — skipping."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing @xenition/sdk@${{ steps.local.outputs.version }}."
          fi

      - name: Install dependencies
        if: steps.decide.outputs.publish == 'true'
        run: npm ci

      - name: Build
        if: steps.decide.outputs.publish == 'true'
        run: npm run build

      - name: Publish
        if: steps.decide.outputs.publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
